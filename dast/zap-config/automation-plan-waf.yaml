env:
  contexts:
    - name: Clinic Management App
      urls:
        - http://waf:8080/
        - http://waf:8080/patients
        - http://waf:8080/appointments
        - http://waf:8080/api/patients
        - http://waf:8080/api/patients/1
        - http://waf:8080/api/patients/2
        - http://waf:8080/api/appointments
        - http://waf:8080/api/appointments/1
        - http://waf:8080/api/appointments/2
        - http://waf:8080/api/appointments?patientName=Afonso
        - http://waf:8080/api/appointments?status=Scheduled
        - http://waf:8080/api/appointments?specialty=Cardiology
        - http://waf:8080/api/appointments?patientName=Afonso&status=Scheduled&specialty=Cardiology
      includePaths:
        - http://waf:8080/.*
        - http://waf:8080/patients.*
        - http://waf:8080/appointments.*
        - http://waf:8080/api/.*
      excludePaths:
        - http://waf:8080/@vite/.*
        - http://waf:8080/src/.*
        - http://waf:8080/node_modules/.*
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: passiveScan-config
    parameters:
      scanOnlyInScope: true
      maxAlertsPerRule: 10
      enableTags: false

  - type: spider
    parameters:
      context: Clinic Management App
      url: http://waf:8080/
      maxDuration: 2
      maxDepth: 5
      maxChildren: 20

  - type: spider
    parameters:
      context: Clinic Management App
      url: http://waf:8080/patients
      maxDuration: 2
      maxDepth: 5
      maxChildren: 20

  - type: spider
    parameters:
      context: Clinic Management App
      url: http://waf:8080/appointments
      maxDuration: 2
      maxDepth: 5
      maxChildren: 20

  - type: spider
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/patients
      maxDuration: 2
      maxDepth: 5
      maxChildren: 20

  - type: spider
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/appointments
      maxDuration: 2
      maxDepth: 5
      maxChildren: 20

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/patients
      maxRuleDurationInMins: 3
      maxScanDurationInMins: 15
      threadPerHost: 2
      addQueryParam: false
    policyDefinition:
      defaultStrength: MEDIUM
      defaultThreshold: MEDIUM
      rules:
        - id: 40018
          strength: HIGH
          threshold: LOW
        - id: 40019
          strength: HIGH
          threshold: LOW
        - id: 40012
          strength: HIGH
          threshold: LOW
        - id: 90019
          strength: HIGH
          threshold: MEDIUM
        - id: 7
          strength: HIGH
          threshold: LOW

  - type: activeScan
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/patients
      maxRuleDurationInMins: 3
      maxScanDurationInMins: 10
      threadPerHost: 2
      addQueryParam: true
    policyDefinition:
      defaultStrength: MEDIUM
      defaultThreshold: MEDIUM
      rules:
        - id: 40018
          strength: HIGH
          threshold: LOW
        - id: 40019
          strength: HIGH
          threshold: LOW
        - id: 40012
          strength: HIGH
          threshold: LOW
        - id: 90019
          strength: HIGH
          threshold: MEDIUM
        - id: 7
          strength: HIGH
          threshold: LOW

  - type: activeScan
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/appointments
      maxRuleDurationInMins: 3
      maxScanDurationInMins: 15
      threadPerHost: 2
      addQueryParam: false
    policyDefinition:
      defaultStrength: MEDIUM
      defaultThreshold: MEDIUM
      rules:
        - id: 40018
          strength: HIGH
          threshold: LOW
        - id: 40019
          strength: HIGH
          threshold: LOW
        - id: 40012
          strength: HIGH
          threshold: LOW
        - id: 90019
          strength: HIGH
          threshold: MEDIUM
        - id: 7
          strength: HIGH
          threshold: LOW

  - type: activeScan
    parameters:
      context: Clinic Management App
      url: http://waf:8080/api/appointments?patientName=Afonso&status=Scheduled&specialty=Cardiology
      maxRuleDurationInMins: 3
      maxScanDurationInMins: 10
      threadPerHost: 2
      addQueryParam: true
    policyDefinition:
      defaultStrength: MEDIUM
      defaultThreshold: MEDIUM
      rules:
        - id: 40018
          strength: HIGH
          threshold: LOW
        - id: 40019
          strength: HIGH
          threshold: LOW
        - id: 40012
          strength: HIGH
          threshold: LOW
        - id: 90019
          strength: HIGH
          threshold: MEDIUM
        - id: 7
          strength: HIGH
          threshold: LOW

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-waf-report.html
      reportTitle: DAST Scan - Clinic Management App
      reportDescription: Local OWASP ZAP scan for the clinic management application
      displayReport: false

  - type: report
    parameters:
      template: sarif-json
      reportDir: /zap/wrk
      reportFile: zap-waf-report.sarif
      reportTitle: DAST Scan - Clinic Management App
      reportDescription: SARIF report for code scanning ingestion
      displayReport: false

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-waf-report.json
      reportTitle: DAST Scan - Clinic Management App
      displayReport: false
