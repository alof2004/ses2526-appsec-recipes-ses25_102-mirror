name: DAST Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Software repository branch or tag to scan
        required: false
        default: develop
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: dast-nightly
  cancel-in-progress: false

env:
  TARGET_REPOSITORY: detiuaveiro/softwate-baseline-ses25_102
  TARGET_REPOSITORY_URL: https://github.com/detiuaveiro/softwate-baseline-ses25_102
  DEFAULT_TARGET_REF: develop

jobs:
  zap:
    name: OWASP ZAP
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out AppSec repository (DAST scripts/config)
        uses: actions/checkout@v4
        with:
          path: appsec

      - name: Check out software repository (application code)
        uses: actions/checkout@v4
        with:
          repository: detiuaveiro/softwate-baseline-ses25_102
          ref: ${{ inputs.target_ref || env.DEFAULT_TARGET_REF }}
          token: ${{ secrets.SOFTWARE_REPO_PAT }}
          path: software

      - name: Create Docker network
        run: docker network create dast-network

      - name: Start PostgreSQL database
        run: |
          docker run -d \
            --name postgres \
            --network dast-network \
            -e POSTGRES_DB=clinic_db \
            -e POSTGRES_USER=clinic_user \
            -e POSTGRES_PASSWORD=clinic_pass \
            postgres:16-alpine

          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if docker exec postgres pg_isready -U clinic_user -d clinic_db >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i: PostgreSQL not ready yet, waiting..."
            sleep 2
          done

      - name: Build and start backend
        working-directory: software
        run: |
          docker build -t clinic-backend:dast ./src/backend
          docker run -d \
            --name backend \
            --network dast-network \
            -p 18080:8080 \
            -e SERVER_PORT=8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/clinic_db \
            -e SPRING_DATASOURCE_USERNAME=clinic_user \
            -e SPRING_DATASOURCE_PASSWORD=clinic_pass \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            clinic-backend:dast

      - name: Build and start frontend
        working-directory: software
        run: |
          docker build -t clinic-frontend:dast ./src/frontend
          docker run -d \
            --name frontend \
            --network dast-network \
            -p 15173:5173 \
            -e VITE_API_BASE_URL=/api \
            -e VITE_PROXY_TARGET=http://backend:8080 \
            clinic-frontend:dast

      - name: Wait for application to be ready
        run: |
          BACKEND_URL="http://localhost:18080/api/patients"
          FRONTEND_URL="http://localhost:15173/patients"
          TIMEOUT_SECONDS=240
          START_TIME="$(date +%s)"

          echo "Waiting for backend at ${BACKEND_URL}"
          echo "Waiting for frontend at ${FRONTEND_URL}"

          while true; do
            if curl -fsS "${BACKEND_URL}" >/dev/null 2>&1 && curl -fsS "${FRONTEND_URL}" >/dev/null 2>&1; then
              echo "Application is reachable."
              break
            fi

            NOW="$(date +%s)"
            if [ $((NOW - START_TIME)) -ge "${TIMEOUT_SECONDS}" ]; then
              echo "Timed out waiting for the application to become ready." >&2
              docker logs backend || true
              docker logs frontend || true
              exit 1
            fi

            sleep 5
          done

      - name: Run OWASP ZAP automation scan
        run: |
          mkdir -p appsec/dast/reports
          chmod 0777 appsec/dast/reports

          set +e
          docker run --rm \
            --user root \
            --network dast-network \
            -v "$PWD/appsec/dast/zap-config:/zap/config:ro" \
            -v "$PWD/appsec/dast/reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/config/automation-plan.yaml
          scan_exit_code=$?
          set -e

          echo "ZAP exited with code ${scan_exit_code}."
          if [ ! -f "appsec/dast/reports/zap-report.json" ]; then
            echo "ZAP did not produce appsec/dast/reports/zap-report.json" >&2
            exit 1
          fi

          if [ -f "appsec/dast/reports/zap-report.sarif.json" ] && [ ! -f "appsec/dast/reports/zap-report.sarif" ]; then
            mv "appsec/dast/reports/zap-report.sarif.json" "appsec/dast/reports/zap-report.sarif"
          fi

          exit "${scan_exit_code}"

      - name: Clean up Docker containers
        if: always()
        run: |
          docker stop frontend backend postgres || true
          docker rm frontend backend postgres || true
          docker network rm dast-network || true

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-nightly-reports
          path: |
            appsec/dast/reports/zap-report.html
            appsec/dast/reports/zap-report.json
            appsec/dast/reports/zap-report.sarif
          if-no-files-found: warn

      - name: Summarize DAST findings
        if: always() && hashFiles('appsec/dast/reports/zap-report.json') != ''
        env:
          TARGET_REF: ${{ inputs.target_ref || env.DEFAULT_TARGET_REF }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("appsec/dast/reports/zap-report.json")
          report = json.loads(report_path.read_text())
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          def parse_severity(alert):
              riskdesc = alert.get("riskdesc") or ""
              severity = riskdesc.split(" ", 1)[0] if riskdesc else "Informational"
              if severity == "Info":
                  return "Informational"
              if severity in {"High", "Medium", "Low", "Informational"}:
                  return severity
              return "Informational"

          counts = {"High": 0, "Medium": 0, "Low": 0, "Informational": 0}
          alert_types = {}
          for site in report.get("site", []):
              for alert in site.get("alerts", []):
                  severity = parse_severity(alert)
                  key = (alert.get("pluginid"), alert.get("name"), severity)
                  if key not in alert_types:
                      alert_types[key] = {
                          "name": alert.get("name", "Unknown alert"),
                          "severity": severity,
                          "instances": 0,
                      }
                      counts[severity] = counts.get(severity, 0) + 1

                  alert_types[key]["instances"] += len(alert.get("instances", []))

          lines = [
              "## DAST Scan Summary",
              "",
              f"- Target repository: `{os.environ['TARGET_REPOSITORY']}`",
              f"- Target ref: `{os.environ['TARGET_REF']}`",
              "",
              "| Severity | Count |",
              "| --- | ---: |",
              f"| High | {counts.get('High', 0)} |",
              f"| Medium | {counts.get('Medium', 0)} |",
              f"| Low | {counts.get('Low', 0)} |",
              f"| Informational | {counts.get('Informational', 0)} |",
              f"| Total | {sum(counts.values())} |",
          ]

          top_alerts = sorted(
              alert_types.values(),
              key=lambda item: (
                  {"High": 0, "Medium": 1, "Low": 2, "Informational": 3}.get(item["severity"], 4),
                  -item["instances"],
                  item["name"],
              ),
          )

          if top_alerts:
              lines.extend(
                  [
                      "",
                      "### Alert Types",
                      "",
                      "| Alert | Severity | Instances |",
                      "| --- | --- | ---: |",
                  ]
              )
              for alert in top_alerts:
                  lines.append(
                      f"| {alert['name']} | {alert['severity']} | {alert['instances']} |"
                  )

          summary_path.write_text("\n".join(lines) + "\n")
          PY
