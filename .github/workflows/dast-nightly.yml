name: DAST Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Software repository branch or tag to scan
        required: false
        default: develop
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: dast-nightly
  cancel-in-progress: false

env:
  TARGET_REPOSITORY: detiuaveiro/softwate-baseline-ses25_102
  TARGET_REPOSITORY_URL: https://github.com/detiuaveiro/softwate-baseline-ses25_102
  DEFAULT_TARGET_REF: develop

jobs:
  # ── Job 1: ZAP directly against the backend (no WAF) ──────────────────────
  zap-direct:
    name: OWASP ZAP — Direct (no WAF)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out AppSec repository
        uses: actions/checkout@v4
        with:
          path: appsec

      - name: Check out software repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ inputs.target_ref || env.DEFAULT_TARGET_REF }}
          token: ${{ secrets.SOFTWARE_REPO_PAT }}
          path: software

      - name: Create Docker network
        run: docker network create dast-network

      - name: Start PostgreSQL database
        run: |
          docker run -d \
            --name postgres \
            --network dast-network \
            -e POSTGRES_DB=clinic_db \
            -e POSTGRES_USER=clinic_user \
            -e POSTGRES_PASSWORD=clinic_pass \
            postgres:16-alpine

          for i in {1..30}; do
            if docker exec postgres pg_isready -U clinic_user -d clinic_db >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"; break
            fi
            echo "Attempt $i: waiting..."; sleep 2
          done

      - name: Build and start backend
        working-directory: software
        run: |
          docker build -t clinic-backend:dast ./src/backend
          docker run -d \
            --name backend \
            --network dast-network \
            -p 18080:8080 \
            -e SERVER_PORT=8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/clinic_db \
            -e SPRING_DATASOURCE_USERNAME=clinic_user \
            -e SPRING_DATASOURCE_PASSWORD=clinic_pass \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            -e KEYCLOAK_JWKS_URI=http://localhost:8180/realms/clinic/protocol/openid-connect/certs \
            -e KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/clinic \
            -e CORS_ALLOWED_ORIGINS=http://localhost:15173 \
            clinic-backend:dast

      - name: Build and start frontend
        working-directory: software
        run: |
          docker build -t clinic-frontend:dast \
            --build-arg VITE_API_BASE_URL=http://localhost:18080/api \
            --build-arg VITE_KEYCLOAK_URL=http://localhost:8180 \
            ./src/frontend
          docker run -d \
            --name frontend \
            --network dast-network \
            -p 15173:8080 \
            clinic-frontend:dast

      - name: Wait for application to be ready
        run: |
          backend_url="http://localhost:18080/api/patients"
          frontend_url="http://localhost:15173"
          timeout_seconds=240
          start_time="$(date +%s)"

          while true; do
            backend_status=$(curl -s -o /dev/null -w "%{http_code}" "${backend_url}" 2>/dev/null || echo "000")
            frontend_ok=$(curl -fsS "${frontend_url}" >/dev/null 2>&1 && echo "yes" || echo "no")

            if [[ "$backend_status" =~ ^[2-4][0-9][0-9]$ ]] && [ "$frontend_ok" = "yes" ]; then
              echo "Stack is reachable (backend: ${backend_status})."; break
            fi

            now="$(date +%s)"
            if [ $((now - start_time)) -ge "${timeout_seconds}" ]; then
              echo "Timed out." >&2; docker logs backend || true; docker logs frontend || true; exit 1
            fi
            echo "backend=${backend_status} frontend=${frontend_ok} — retrying in 5s..."; sleep 5
          done

      - name: Run OWASP ZAP baseline scan (direct)
        run: |
          mkdir -p appsec/dast/reports/dast-direct-reports
          chmod 0777 appsec/dast/reports/dast-direct-reports

          set +e
          docker run --rm \
            --network dast-network \
            -v "$PWD/appsec/dast/reports/dast-direct-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "http://frontend:8080" \
            -a -j -I -m 2 -D 5 \
            -r zap-direct-report.html \
            -J zap-direct-report.json \
            --autooff
          scan_exit_code=$?
          set -e

          echo "ZAP exited with code ${scan_exit_code}."
          if [ ! -f "appsec/dast/reports/dast-direct-reports/zap-direct-report.json" ]; then
            echo "ZAP did not produce the report." >&2; exit 1
          fi

      - name: Upload direct reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-direct-reports
          path: appsec/dast/reports/dast-direct-reports/
          if-no-files-found: warn

      - name: Clean up
        if: always()
        run: |
          docker stop frontend backend postgres || true
          docker rm  frontend backend postgres || true
          docker network rm dast-network || true

  # ── Job 2: ZAP through Nginx + ModSecurity WAF ────────────────────────────
  zap-via-waf:
    name: OWASP ZAP — Via WAF (Nginx + ModSecurity CRS)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out AppSec repository
        uses: actions/checkout@v4
        with:
          path: appsec

      - name: Check out software repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ inputs.target_ref || env.DEFAULT_TARGET_REF }}
          token: ${{ secrets.SOFTWARE_REPO_PAT }}
          path: software

      - name: Create Docker network
        run: docker network create dast-waf-network

      - name: Start PostgreSQL database
        run: |
          docker run -d \
            --name postgres \
            --network dast-waf-network \
            -e POSTGRES_DB=clinic_db \
            -e POSTGRES_USER=clinic_user \
            -e POSTGRES_PASSWORD=clinic_pass \
            postgres:16-alpine

          for i in {1..30}; do
            if docker exec postgres pg_isready -U clinic_user -d clinic_db >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"; break
            fi
            echo "Attempt $i: waiting..."; sleep 2
          done

      - name: Build and start backend (internal only)
        working-directory: software
        run: |
          docker build -t clinic-backend:dast-waf ./src/backend
          docker run -d \
            --name backend \
            --network dast-waf-network \
            -e SERVER_PORT=8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/clinic_db \
            -e SPRING_DATASOURCE_USERNAME=clinic_user \
            -e SPRING_DATASOURCE_PASSWORD=clinic_pass \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            -e KEYCLOAK_JWKS_URI=http://localhost:8180/realms/clinic/protocol/openid-connect/certs \
            -e KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/clinic \
            -e CORS_ALLOWED_ORIGINS=http://localhost:15173 \
            clinic-backend:dast-waf

          for i in {1..30}; do
            if docker exec backend curl -sf http://localhost:8080/v3/api-docs >/dev/null 2>&1; then
              echo "Backend is ready!"; break
            fi
            echo "Attempt $i: waiting..."; sleep 3
          done

      - name: Generate self-signed cert for WAF
        run: |
          mkdir -p software/certs
          openssl req -x509 -nodes -days 365 \
            -subj "/C=PT/ST=Aveiro/O=ClinicLab/CN=localhost" \
            -newkey rsa:2048 \
            -keyout software/certs/localhost+1-key.pem \
            -out    software/certs/localhost+1.pem
          chmod o+r software/certs/localhost+1-key.pem

      - name: Build and start WAF
        working-directory: software
        run: |
          docker build -t clinic-waf:dast ./waf
          docker run -d \
            --name waf \
            --network dast-waf-network \
            -p 18080:8080 \
            -p 18443:8443 \
            -v "$PWD/certs/localhost+1.pem:/etc/nginx/conf/server.crt:ro" \
            -v "$PWD/certs/localhost+1-key.pem:/etc/nginx/conf/server.key:ro" \
            -e BACKEND=http://backend:8080 \
            -e PORT=8080 \
            -e SSL_PORT=8443 \
            -e SSL_CERT_FILE=/etc/nginx/conf/server.crt \
            -e SSL_CERT_KEY_FILE=/etc/nginx/conf/server.key \
            -e SSL_PROTOCOLS="TLSv1.2 TLSv1.3" \
            -e SSL_CIPHERS="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256" \
            -e SSL_PREFER_CIPHERS=off \
            -e SSL_OCSP_STAPLING=off \
            -e CLIENT_MAX_BODY_SIZE=1m \
            -e SERVER_NAME=localhost \
            -e NGINX_ALWAYS_TLS_REDIRECT=off \
            -e METRICS_ALLOW_FROM=127.0.0.1 \
            -e METRICS_DENY_FROM=all \
            -e ALLOWED_METHODS="GET HEAD POST PUT DELETE OPTIONS" \
            clinic-waf:dast

      - name: Build and start frontend (pointing at WAF)
        working-directory: software
        run: |
          docker build -t clinic-frontend:dast-waf \
            --build-arg VITE_API_BASE_URL=http://localhost:18080/api \
            --build-arg VITE_KEYCLOAK_URL=http://localhost:8180 \
            ./src/frontend
          docker run -d \
            --name frontend \
            --network dast-waf-network \
            -p 15173:8080 \
            clinic-frontend:dast-waf

      - name: Wait for stack to be ready
        run: |
          waf_url="http://localhost:18080/api/patients"
          frontend_url="http://localhost:15173"
          timeout_seconds=240
          start_time="$(date +%s)"

          while true; do
            waf_status=$(curl -s -o /dev/null -w "%{http_code}" "${waf_url}" 2>/dev/null || echo "000")
            frontend_ok=$(curl -fsS "${frontend_url}" >/dev/null 2>&1 && echo "yes" || echo "no")

            if [[ "$waf_status" =~ ^[2-4][0-9][0-9]$ ]] && [ "$frontend_ok" = "yes" ]; then
              echo "Stack is reachable (waf: ${waf_status})."; break
            fi

            now="$(date +%s)"
            if [ $((now - start_time)) -ge "${timeout_seconds}" ]; then
              echo "Timed out." >&2; docker logs waf || true; docker logs backend || true; exit 1
            fi
            echo "waf=${waf_status} frontend=${frontend_ok} — retrying in 5s..."; sleep 5
          done

      - name: Run OWASP ZAP baseline scan (via WAF)
        run: |
          mkdir -p appsec/dast/reports/dast-waf-reports
          chmod 0777 appsec/dast/reports/dast-waf-reports

          set +e
          docker run --rm \
            --network dast-waf-network \
            -v "$PWD/appsec/dast/reports/dast-waf-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "http://waf:8080" \
            -a -j -I -m 2 -D 5 \
            -r zap-waf-report.html \
            -J zap-waf-report.json \
            --autooff
          scan_exit_code=$?
          set -e

          echo "ZAP exited with code ${scan_exit_code}."
          if [ ! -f "appsec/dast/reports/dast-waf-reports/zap-waf-report.json" ]; then
            echo "ZAP did not produce the report." >&2; exit 1
          fi

      - name: Collect WAF ModSecurity audit log
        if: always()
        timeout-minutes: 2
        run: |
          mkdir -p appsec/dast/reports/dast-waf-reports
          timeout 60 docker exec waf cat /var/log/modsec_audit.log > appsec/dast/reports/dast-waf-reports/modsec-audit.log 2>/dev/null || echo "audit log unavailable"
          timeout 60 docker exec waf cat /var/log/nginx/access.log  > appsec/dast/reports/dast-waf-reports/nginx-access.log  2>/dev/null || echo "access log unavailable"
          echo "ModSecurity blocks during scan:"
          grep -c '"is_interrupted":true' appsec/dast/reports/dast-waf-reports/modsec-audit.log 2>/dev/null || echo "0 blocks"

      - name: Upload WAF reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-waf-reports
          path: appsec/dast/reports/dast-waf-reports/
          if-no-files-found: warn

      - name: Clean up
        if: always()
        run: |
          docker stop frontend waf backend postgres || true
          docker rm  frontend waf backend postgres || true
          docker network rm dast-waf-network || true
